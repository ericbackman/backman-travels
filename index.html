<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backman Travels</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body data-theme="dark">
  <header id="header">
    <div class="header-left">
      <h1 class="logo">🌍 Backman Travels</h1>
    </div>
    <div class="header-center">
      <nav class="tabs">
        <button class="tab active" data-tab="map">Map</button>
        <button class="tab" data-tab="trips">Trips</button>
        <button class="tab" data-tab="stats">Stats</button>
      </nav>
    </div>
    <div class="header-right">
      <div class="stats-bar">
        <span class="stat" id="stat-trips"><strong>0</strong> trips</span>
        <span class="stat" id="stat-countries"><strong>0</strong> countries</span>
        <span class="stat" id="stat-cities"><strong>0</strong> cities</span>
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
    </div>
  </header>

  <main>
    <section id="page-map" class="page active">
      <div id="map"></div>
    </section>

    <section id="page-trips" class="page">
      <div class="trips-container" id="trips-container"></div>
    </section>

    <section id="page-stats" class="page">
      <div class="stats-container" id="stats-container"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="https://unpkg.com/leaflet-ant-path@1.3.0/dist/leaflet-ant-path.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/map.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
